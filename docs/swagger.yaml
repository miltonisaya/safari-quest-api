              type: object
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/response.CustomApiResponse'
      security:
      - BearerAuth: []
      summary: List roles
      tags:
      - Roles
    post:
      consumes:
      - application/json
      description: Create a new role
      parameters:
      - description: Role data
        in: body
        name: body
        required: true
