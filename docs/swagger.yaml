        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/response.CustomApiResponse'
      security:
      - BearerAuth: []
      summary: Delete role
      tags:
      - Roles
    get:
      description: Return a single role by UUID
      parameters:
      - description: Role UUID
        in: path
        name: uuid
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
