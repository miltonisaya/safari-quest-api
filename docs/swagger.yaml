definitions:
  response.CustomApiResponse:
    properties:
      code:
        type: integer
      data: {}
      message:
        type: string
      status:
        $ref: '#/definitions/response.Status'
    type: object
  response.Status:
    enum:
    - success
    - fail
    - error
    type: string
    x-enum-varnames:
    - StatusSuccess
    - StatusFail
    - StatusError
  services.LoginInput:
    properties:
      email:
        type: string
      password:
        type: string
    required:
    - email
    - password
    type: object
  services.LoginResponse:
    properties:
      token:
        type: string
      user:
        $ref: '#/definitions/services.UserResponse'
    type: object
  services.RoleInput:
    properties:
      code:
        type: string
      name:
        type: string
    required:
    - code
    - name
    type: object
  services.RoleResponse:
    properties:
      code:
        type: string
      created_at:
        type: string
      name:
        type: string
      updated_at:
        type: string
      uuid:
        type: string
    type: object
  services.UserInput:
    properties:
      address:
        type: string
      email:
        type: string
      first_name:
        type: string
      last_name:
        type: string
      middle_name:
        type: string
      mobile:
        type: string
      password:
        minLength: 8
        type: string
      role_ids:
        items:
          type: string
        minItems: 1
        type: array
      sex:
        type: string
    required:
    - address
    - email
    - first_name
    - last_name
    - mobile
    - password
    - role_ids
    - sex
    type: object
  services.UserResponse:
    properties:
      address:
        type: string
      created_at:
        type: string
      email:
        type: string
      email_verified_at:
        type: string
      first_name:
        type: string
      is_active:
        type: boolean
      last_name:
        type: string
      middle_name:
        type: string
      mobile:
        type: string
      roles:
        items:
          $ref: '#/definitions/services.RoleResponse'
        type: array
      sex:
        type: string
      updated_at:
        type: string
      uuid:
        type: string
    type: object
info:
  contact: {}
paths:
  /auth/login:
    post:
      consumes:
      - application/json
      description: Authenticate with email and password and receive a JWT token
      parameters:
      - description: Login credentials
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/services.LoginInput'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/response.CustomApiResponse'
            - properties:
                data:
                  $ref: '#/definitions/services.LoginResponse'
              type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/response.CustomApiResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/response.CustomApiResponse'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/response.CustomApiResponse'
      summary: Login
      tags:
      - Auth
